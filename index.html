<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zown Asset Hub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F7F8FA; color: #1A1A2E; min-height: 100vh; }
  .topbar { display: flex; align-items: center; gap: 16px; padding: 14px 24px; background: #fff; border-bottom: 1px solid #E8EAF0; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; text-decoration: none; }
  .logo-mark { width: 32px; height: 32px; background: #1E3A5F; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 600; }
  .logo-text { font-size: 15px; font-weight: 600; color: #1A1A2E; }
  .logo-text span { color: #8A93A8; font-weight: 400; }
  .search-wrap { flex: 1; max-width: 400px; position: relative; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #8A93A8; pointer-events: none; }
  .search-wrap input { width: 100%; padding: 9px 12px 9px 36px; font-size: 13px; border-radius: 8px; border: 1px solid #E8EAF0; background: #F7F8FA; color: #1A1A2E; outline: none; }
  .search-wrap input:focus { border-color: #1E3A5F; background: #fff; }
  .topbar-meta { margin-left: auto; font-size: 12px; color: #8A93A8; }
  .layout { display: flex; min-height: calc(100vh - 61px); }
  .sidebar { width: 200px; flex-shrink: 0; padding: 20px 12px; border-right: 1px solid #E8EAF0; background: #fff; }
  .sec { margin-bottom: 20px; }
  .sec-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .09em; color: #B0B8CC; margin: 0 0 6px 8px; }
  .fb { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 6px 8px; border-radius: 7px; border: none; background: none; font-size: 13px; color: #5A6478; cursor: pointer; text-align: left; transition: background .1s; }
  .fb:hover { background: #F7F8FA; color: #1A1A2E; }
  .fb.active { background: #EBF0F8; color: #1E3A5F; font-weight: 600; }
  .fb-cnt { font-size: 11px; color: #B0B8CC; }
  .divider { height: 1px; background: #F0F2F7; margin: 4px 0 16px; }
  .main { flex: 1; padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .card { background: #fff; border: 1px solid #E8EAF0; border-radius: 12px; overflow: hidden; transition: border-color .15s, box-shadow .15s; }
  .card:hover { border-color: #C5D4E8; box-shadow: 0 2px 12px rgba(30,58,95,.08); }
  .card-thumb { height: 110px; background: #EBF0F8; display: flex; align-items: center; justify-content: center; position: relative; }
  .card-thumb svg { color: #1E3A5F; opacity: .5; }
  .badge-soon { position: absolute; top: 8px; right: 8px; font-size: 10px; padding: 3px 9px; border-radius: 99px; font-weight: 600; background: #FFF8E1; color: #8B6400; border: 1px solid #FFE57F; }
  .card-body { padding: 11px 13px 13px; }
  .card-type { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #1E3A5F; margin-bottom: 3px; }
  .card-name { font-size: 13px; font-weight: 600; color: #1A1A2E; line-height: 1.3; margin-bottom: 8px; }
  .variants { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; min-height: 22px; }
  .vchip { font-size: 11px; padding: 3px 9px; border-radius: 99px; border: 1px solid #E8EAF0; color: #5A6478; cursor: pointer; background: #F7F8FA; transition: all .1s; user-select: none; }
  .vchip:hover { border-color: #1E3A5F; color: #1E3A5F; }
  .vchip.sel { border-color: #1E3A5F; color: #1E3A5F; background: #EBF0F8; font-weight: 600; }
  .actions { display: flex; gap: 6px; }
  .btn-assets { flex: 1; font-size: 11px; padding: 6px 8px; border-radius: 7px; border: 1px solid #E8EAF0; background: none; color: #5A6478; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; text-decoration: none; transition: background .1s; font-family: inherit; }
  .btn-assets:hover { background: #F7F8FA; border-color: #C5D4E8; }
  .btn-assets.disabled { opacity: .35; cursor: default; pointer-events: none; }
  .btn-icon { width: 32px; height: 32px; border-radius: 7px; border: 1px solid #E8EAF0; background: none; color: #5A6478; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: background .1s; }
  .btn-icon:hover { background: #F7F8FA; border-color: #C5D4E8; }
  .state { text-align: center; padding: 80px 20px; color: #8A93A8; }
  .state svg { margin-bottom: 12px; opacity: .4; }
  .state p { font-size: 14px; }
  .coll-header { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #8A93A8; margin: 0 0 12px; padding-bottom: 8px; border-bottom: 1px solid #F0F2F7; }
  .coll-section { margin-bottom: 32px; }
</style>
</head>
<body>

<div class="topbar">
  <a class="logo" href="#">
    <div class="logo-mark">ZW</div>
    <div class="logo-text">Asset Hub <span>/ Zown</span></div>
  </a>
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search products…" oninput="render()">
  </div>
  <div class="topbar-meta" id="top-meta">Loading…</div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sec">
      <div class="sec-label">Collection</div>
      <button class="fb active" data-val="all" data-filter="col" onclick="setF('col','all')">All <span class="fb-cnt" id="cnt-all">—</span></button>
      <div id="col-list"></div>
    </div>
    <div class="divider"></div>
    <div class="sec">
      <div class="sec-label">Type</div>
      <button class="fb active" data-val="all" data-filter="type" onclick="setF('type','all')">All</button>
      <div id="type-list"></div>
    </div>
    <div class="divider"></div>
    <div class="sec">
      <div class="sec-label">Status</div>
      <button class="fb active" data-val="all" data-filter="status" onclick="setF('status','all')">All</button>
      <button class="fb" data-val="Active" data-filter="status" onclick="setF('status','Active')">Active</button>
      <button class="fb" data-val="Coming soon" data-filter="status" onclick="setF('status','Coming soon')">Coming soon</button>
    </div>
  </div>

  <div class="main">
    <div class="state" id="state">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      <p>Loading assets…</p>
    </div>
    <div id="grid-wrap" style="display:none"></div>
  </div>
</div>

<script>
let products = [];
let filters = { col: 'all', type: 'all', status: 'all' };
let selVariant = {};

function parseCSV(text) {
  const lines = text.trim().split('\n');
  return lines.map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

async function loadData() {
  try {
    const res = await fetch('products.csv');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseCSV(text);

    const raw = rows.map(r => ({
      collection: (r[0] || '').trim(),
      type:       (r[1] || '').trim(),
      name:       (r[2] || '').trim(),
      status:     (r[3] || '').trim(),
      sku:        (r[4] || '').trim(),
      color:      (r[5] || '').trim(),
      folder:     (r[6] || '').trim(),
      datasheet:  (r[7] || '').trim(),
      video:      (r[8] || '').trim(),
    })).filter(r => r.name);

    const map = {};
    raw.forEach(r => {
      const key = `${r.collection}||${r.type}||${r.name}`;
      if (!map[key]) map[key] = { collection: r.collection, type: r.type, name: r.name, status: r.status, datasheet: r.datasheet, video: r.video, variants: [] };
      if (r.sku) map[key].variants.push({ sku: r.sku, color: r.color || r.sku, folder: r.folder });
    });

    products = Object.values(map);
    buildSidebar();
    render();
  } catch(e) {
    showError('Could not load products.csv — make sure the file is in the same folder as index.html.<br><small>' + e.message + '</small>');
  }
}

function showError(msg) {
  document.getElementById('state').innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>${msg}</p>`;
  document.getElementById('state').style.display = 'block';
  document.getElementById('grid-wrap').style.display = 'none';
  document.getElementById('top-meta').textContent = 'Error';
}

function buildSidebar() {
  const cols  = [...new Set(products.map(p => p.collection).filter(Boolean))];
  const types = [...new Set(products.map(p => p.type).filter(Boolean))];
  document.getElementById('cnt-all').textContent = products.length;
  document.getElementById('col-list').innerHTML = cols.map(c =>
    `<button class="fb" data-val="${c}" data-filter="col" onclick="setF('col',this.dataset.val)">${c} <span class="fb-cnt">${products.filter(p=>p.collection===c).length}</span></button>`
  ).join('');
  document.getElementById('type-list').innerHTML = types.map(t =>
    `<button class="fb" data-val="${t}" data-filter="type" onclick="setF('type',this.dataset.val)">${t}</button>`
  ).join('');
}

function setF(key, val) {
  filters[key] = val;
  document.querySelectorAll(`[data-filter="${key}"]`).forEach(b => b.classList.toggle('active', b.dataset.val === val));
  render();
}

function typeIcon(t) {
  t = (t || '').toLowerCase();
  if (t.includes('taul') || t.includes('table')) return `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="4" rx="1"/><path d="M5 7v14M19 7v14M8 21h8"/></svg>`;
  if (t.includes('troll')) return `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>`;
  if (t.includes('access')) return `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`;
  return `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 9V7a2 2 0 0 0-2-2h-6L9 2H4a2 2 0 0 0-2 2v16c0 1.1.9 2 2 2h7"/><path d="M14 19h8M18 15v8"/></svg>`;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = products.filter(p => {
    if (filters.col    !== 'all' && p.collection !== filters.col)    return false;
    if (filters.type   !== 'all' && p.type       !== filters.type)   return false;
    if (filters.status !== 'all' && p.status     !== filters.status) return false;
    if (q && !p.name.toLowerCase().includes(q) && !p.collection.toLowerCase().includes(q) && !p.type.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('top-meta').textContent = `${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    document.getElementById('state').innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No products match your search.</p>`;
    document.getElementById('state').style.display = 'block';
    document.getElementById('grid-wrap').style.display = 'none';
    return;
  }

  document.getElementById('state').style.display = 'none';
  document.getElementById('grid-wrap').style.display = 'block';

  const showGroups = filters.col === 'all' && !q;
  let html = '';

  if (showGroups) {
    const grouped = {};
    filtered.forEach(p => { if (!grouped[p.collection]) grouped[p.collection] = []; grouped[p.collection].push(p); });
    Object.entries(grouped).forEach(([col, prods]) => {
      html += `<div class="coll-section"><div class="coll-header">${col} <span style="font-weight:400;color:#B0B8CC">(${prods.length})</span></div><div class="grid">${prods.map(cardHTML).join('')}</div></div>`;
    });
  } else {
    html = `<div class="grid">${filtered.map(cardHTML).join('')}</div>`;
  }

  document.getElementById('grid-wrap').innerHTML = html;
  document.querySelectorAll('.vchip').forEach(c => c.addEventListener('click', () => { selVariant[c.dataset.pid] = c.dataset.sku; render(); }));
}

function cardHTML(p) {
  const pid = btoa(unescape(encodeURIComponent(p.name))).replace(/\W/g,'').slice(0,16);
  if (!selVariant[pid] && p.variants.length) selVariant[pid] = p.variants[0].sku;
  const sel = p.variants.find(v => v.sku === selVariant[pid]) || p.variants[0];
  const folder = sel?.folder || '';

  const chips = p.variants.map(v =>
    `<span class="vchip${selVariant[pid]===v.sku?' sel':''}" data-pid="${pid}" data-sku="${v.sku}">${v.color}</span>`
  ).join('');

  const folderBtn = folder
    ? `<a class="btn-assets" href="${folder}" target="_blank" rel="noopener"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> Assets</a>`
    : `<span class="btn-assets disabled"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> Assets</span>`;

  const dsBtn = p.datasheet
    ? `<a class="btn-icon" href="${p.datasheet}" target="_blank" rel="noopener" title="Product sheet"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></a>` : '';

  const vidBtn = p.video
    ? `<a class="btn-icon" href="${p.video}" target="_blank" rel="noopener" title="Tutorial video"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg></a>` : '';

  return `<div class="card">
    <div class="card-thumb">
      ${typeIcon(p.type)}
      ${p.status === 'Coming soon' ? '<span class="badge-soon">Coming soon</span>' : ''}
    </div>
    <div class="card-body">
      <div class="card-type">${p.type}</div>
      <div class="card-name">${p.name}</div>
      <div class="variants">${chips}</div>
      <div class="actions">${folderBtn}${dsBtn}${vidBtn}</div>
    </div>
  </div>`;
}

loadData();
</script>
</body>
</html>
